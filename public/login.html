<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecondStitch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-pink': '#ffadd1',
                        'brand-green': '#ccffda',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans flex flex-col min-h-screen">

    <header class="bg-brand-pink text-gray-900 py-4 shadow-md">
        <div class="container mx-auto px-6">
            <h1 class="text-2xl font-bold"><a href="index.html">← Back to SecondStitch</a></h1>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Log in to rescue more apparel.</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" name="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-pink focus:ring-brand-pink p-3 border">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-pink focus:ring-brand-pink p-3 border">
                </div>

                <button type="submit" class="w-full bg-brand-pink text-gray-900 font-bold py-3 px-4 rounded-md shadow hover:bg-pink-400 hover:shadow-lg transition-all duration-200">
                    Log In
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600 border-t pt-6">
                Don't have an account? 
                <a href="signup.html" class="font-bold text-gray-900 hover:text-pink-500 hover:underline">Sign up here</a>
            </div>
        </div>
    </main>

</body>
</html>
