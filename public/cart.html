<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - SecondStitch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-pink': '#ffadd1',
                        'brand-green': '#ccffda',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <header class="bg-brand-pink text-gray-900 py-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold"><a href="index.html">SecondStitch</a></h1>
            <a href="index.html" class="text-sm font-semibold hover:text-white transition flex items-center gap-1">
                ← Continue Shopping
            </a>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-6xl">
        <h2 class="text-3xl font-bold text-gray-900 mb-8">Shopping Cart</h2>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div id="cartItemsContainer" class="lg:col-span-8 space-y-6">
                </div>

            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200 sticky top-24">
                    <h3 class="text-xl font-bold text-gray-900 mb-6">Order Summary</h3>
                    
                    <div class="space-y-4 text-gray-700 mb-6">
                        <div class="flex justify-between">
                            <span>Subtotal (<span id="cartCount">0</span> items)</span>
                            <span id="cartSubtotal" class="font-medium">₹0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Shipping</span>
                            <span class="text-green-600 font-medium">Free</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-500">
                            <span>Taxes</span>
                            <span>Calculated at checkout</span>
                        </div>
                    </div>

                    <div class="border-t border-gray-200 pt-4 mb-6">
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold text-gray-900">Estimated Total</span>
                            <span id="cartTotal" class="text-2xl font-bold text-gray-900">₹0</span>
                        </div>
                    </div>

                    <button class="w-full bg-brand-green text-gray-900 text-lg font-bold py-3 px-4 rounded-md shadow-sm hover:bg-green-300 hover:shadow-lg transition-all duration-200 flex justify-center items-center gap-2">
                        Proceed to Checkout
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    
                    <div class="mt-4 flex justify-center items-center gap-2 text-gray-500 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        Secure Checkout
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function renderCart() {
            // Find the places on the page we need to update
            const cartContainer = document.getElementById('cartItemsContainer');
            const cartSubtotal = document.getElementById('cartSubtotal');
            const cartTotal = document.getElementById('cartTotal');
            const cartCount = document.getElementById('cartCount');
            
            // Get the cart data from the browser's memory
            let cart = JSON.parse(localStorage.getItem('secondStitchCart')) || [];
            
            // What to show if the cart is empty
            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center">
                        <p class="text-gray-500 text-lg mb-4">Your cart is currently empty.</p>
                        <a href="index.html" class="inline-block bg-brand-pink text-gray-900 font-bold py-3 px-8 rounded-md hover:bg-pink-400 transition">Continue Shopping</a>
                    </div>`;
                cartSubtotal.innerText = '₹0';
                cartTotal.innerText = '₹0';
                cartCount.innerText = '0';
                return; // Stop running the rest of the code
            }

            // Variables to keep track of totals
            let cartHTML = '';
            let totalAmount = 0;
            let totalItems = 0;

            // Loop through each item in the cart and build the HTML
            cart.forEach((item, index) => {
                totalAmount += (item.price * item.quantity);
                totalItems += item.quantity;

                cartHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center gap-6">
                        <img src="${item.image}" alt="${item.name}" class="w-full sm:w-32 h-32 object-cover rounded-md">
                        
                        <div class="flex-grow text-center sm:text-left w-full">
                            <h3 class="text-xl font-bold text-gray-900">${item.name}</h3>
                            <p class="text-gray-500 text-sm mt-1">Price: ₹${item.price}</p>
                            
                            <div class="mt-4 flex items-center justify-center sm:justify-start gap-4">
                                <span class="font-medium text-gray-700 bg-gray-100 px-3 py-1 rounded">Qty: ${item.quantity}</span>
                                <button onclick="removeItem(${index})" class="text-sm text-red-500 hover:text-red-700 font-medium hover:underline">Remove</button>
                            </div>
                        </div>

                        <div class="text-xl font-bold text-gray-900 sm:text-right mt-4 sm:mt-0">
                            ₹${item.price * item.quantity}
                        </div>
                    </div>
                `;
            });

            // Put the HTML we just built onto the page
            cartContainer.innerHTML = cartHTML;
            
            // Update the totals on the right side
            cartSubtotal.innerText = `₹${totalAmount}`;
            cartTotal.innerText = `₹${totalAmount}`;
            cartCount.innerText = totalItems;
        }

        // This function runs when someone clicks "Remove"
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('secondStitchCart')) || [];
            cart.splice(index, 1); // Cut out the item at that specific index
            localStorage.setItem('secondStitchCart', JSON.stringify(cart)); // Save the updated list back to memory
            renderCart(); // Refresh the page to show the new layout
        }

        // Run the render function immediately when the page loads
        renderCart();
    </script>

</body>
</html>
